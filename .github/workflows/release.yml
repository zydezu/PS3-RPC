name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.4.9)"
        required: true
      changelog:
        description: "Release notes / changelog"
        required: false

jobs:
  windows_x64:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Setup venv
        run: python -m venv .venv
      - name: Install dependencies
        shell: pwsh
        run: |
          .\.venv\Scripts\activate.ps1
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
      - name: Install PyInstaller
        shell: pwsh
        run: |
          .\.venv\Scripts\activate.ps1
          pip install pyinstaller
      - name: Build Windows executable
        shell: pwsh
        run: |
          .\.venv\Scripts\activate.ps1
          pyinstaller --onefile --name "PS3RPC_Windows_x64" start.py
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: PS3RPC_Windows_x64
          path: dist/PS3RPC_Windows_x64.exe

  windows_arm64:
    name: Build Windows ARM64
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Setup venv
        run: python -m venv .venv
      - name: Install dependencies
        shell: pwsh
        run: |
          .\.venv\Scripts\activate.ps1
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
      - name: Install PyInstaller
        shell: pwsh
        run: |
          .\.venv\Scripts\activate.ps1
          pip install pyinstaller
      - name: Build Windows ARM64 executable
        shell: pwsh
        run: |
          .\.venv\Scripts\activate.ps1
          pyinstaller --onefile --name "PS3RPC_Windows_ARM64" start.py
      - name: Upload Windows ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: PS3RPC_Windows_ARM64
          path: dist/PS3RPC_Windows_ARM64.exe

  linux_x64:
    name: Build Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
      - name: Install PyInstaller
        run: |
          source .venv/bin/activate
          pip install pyinstaller
      - name: Build Linux executable
        run: |
          source .venv/bin/activate
          pyinstaller --onefile --name "PS3RPC_Linux_x64" start.py
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: PS3RPC_Linux_x64
          path: dist/PS3RPC_Linux_x64

  linux_arm64:
    name: Build Linux ARM64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build on ARM64 using arm-runner
        uses: pguyot/arm-runner-action@v2
        with:
          base_image: raspios_lite_arm64:latest
          cpu: cortex-a53
          cpu_info: cpuinfo/raspberrypi_4b
          bind_mount_repository: true
          commands: |
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends python3 python3-venv python3-full
            python3 -m venv .venv
            . .venv/bin/activate
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            pip install pyinstaller
            pyinstaller --onefile --name "PS3RPC_Linux_ARM64" start.py
      - name: Upload Linux ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: PS3RPC_Linux_ARM64
          path: dist/PS3RPC_Linux_ARM64

  macos_x64:
    name: Build macOS x64
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: macos-x64-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            macos-x64-pip-
      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
      - name: Install PyInstaller
        run: |
          source .venv/bin/activate
          pip install pyinstaller
      - name: Build macOS x64 executable
        run: |
          source .venv/bin/activate
          pyinstaller --onefile --name "PS3RPC_MacOS_x64" start.py
      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: PS3RPC_MacOS_x64
          path: dist/PS3RPC_MacOS_x64

  macos_arm64:
    name: Build macOS ARM64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: macos-arm64-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            macos-arm64-pip-
      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
      - name: Install PyInstaller
        run: |
          source .venv/bin/activate
          pip install pyinstaller
      - name: Build macOS ARM64 executable
        run: |
          source .venv/bin/activate
          pyinstaller --onefile --name "PS3RPC_MacOS_ARM64" start.py
      - name: Upload macOS ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: PS3RPC_MacOS_ARM64
          path: dist/PS3RPC_MacOS_ARM64

  release:
    name: Create Release
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - windows_x64
      - windows_arm64
      - linux_x64
      - linux_arm64
      - macos_x64
      - macos_arm64
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: releases
      - name: List files
        run: ls -la releases/*/ || true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.tag }}
          body: ${{ github.event.inputs.changelog }}
          draft: false
          prerelease: false
          files: |
            releases/PS3RPC_Windows_x64/PS3RPC_Windows_x64.exe
            releases/PS3RPC_Windows_ARM64/PS3RPC_Windows_ARM64.exe
            releases/PS3RPC_Linux_x64/PS3RPC_Linux_x64
            releases/PS3RPC_Linux_ARM64/PS3RPC_Linux_ARM64
            releases/PS3RPC_MacOS_x64/PS3RPC_MacOS_x64
            releases/PS3RPC_MacOS_ARM64/PS3RPC_MacOS_ARM64
